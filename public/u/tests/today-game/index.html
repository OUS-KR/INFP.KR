<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 게임 - INFP</title>
    <link rel="stylesheet" href="/u/tests/assets/css/main.css?20251011000000">
    <style>
        .game-card-content {
            text-align: center;
        }
        .game-area {
            margin-top: 1.5em;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .game-display {
            margin-bottom: 1em;
            color: var(--text-color);
        }
        .game-display.question {
            font-size: 1.2em;
            font-weight: bold;
        }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 0.8em;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        .choice-btn {
            padding: 0.8em 1em;
            font-size: 1em;
            background-color: var(--primary-color);
            color: var(--text-color-inverted);
            border: 1px solid var(--primary-color-dark);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
        }
        .choice-btn:hover {
            background-color: var(--primary-color-dark);
        }
        .game-input {
            margin-top: 1.5em;
            margin-bottom: 1em;
            width: 100%;
            max-width: 400px;
        }
        .game-input input[type="text"] {
            padding: 0.5em;
            font-size: 1em;
            width: 100%;
            border: 2px solid var(--border-color, #ccc);
            border-radius: 4px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
        }
        .game-input button {
            padding: 0.6em 1.5em;
            font-size: 1.1em;
            background-color: #007bff;
            color: white;
            border: 1px solid #0069d9;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 0.5em;
        }
        .game-input button:hover {
            background-color: #0069d9;
        }
        .feedback-message {
            margin-top: 1em;
            font-size: 1.2em;
            font-weight: bold;
        }
        .feedback-message.correct {
            color: var(--success-color);
        }
        .feedback-message.incorrect {
            color: var(--error-color);
        }
    </style>
</head>
<body>
    <header class="main-nav">
        <a href="/u/tests/" class="logo">INFP.KR Tests</a>
        <div class="nav-right-section">
            <nav class="nav-links" id="nav-links"></nav>
            <button id="theme-switcher" class="theme-switcher">🌙</button>
            <button id="hamburger" class="hamburger">☰</button>
        </div>
    </header>

    <div class="container">
        <h1>오늘의 INFP 게임</h1>
        <div class="card info-card game-card-content">
            <div id="game-info">
                <div id="gameTitle" class="card-title"></div>
                <p id="gameDescription">게임을 불러오는 중...</p>
            </div>
            <div id="gameArea" class="game-area">
                <!-- Game content will be loaded here by JavaScript -->
            </div>
            <div id="game-input-area">
                <!-- Game input will be loaded here by JavaScript -->
            </div>
            <p id="feedbackMessage" class="feedback-message"></p>
        </div>
    </div>

    <script src="/u/tests/assets/js/main.js?20251011000000" defer></script>
    <script src="/u/tests/assets/js/dynamic-menu.js" defer></script>
    <script>
    function getDailySeed() {
        const today = new Date();
        return today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
    }

    function mulberry32(seed) {
        return function() {
            seed |= 0;
            seed = seed + 0x6D2B79F5 | 0;
            let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) | 0;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    let currentCorrectAnswer = null;
    let currentRandFn = null;
    let gameInProgress = false;

    // --- Game Implementations for INFP ---

    // Game 0: Empathy Choice
    function setupEmpathyChoiceGame() {
        document.getElementById('gameTitle').innerText = "오늘의 게임: 공감 선택";
        const gameArea = document.getElementById('gameArea');
        const scenarios = [
            { q: "친구가 아끼던 펜을 잃어버렸습니다. 뭐라고 위로해 주시겠어요?", a: ["새로 사면 되지.", "정말 속상하겠다. 같이 찾아볼까?", "어디서 잃어버렸는데?"], correct: 1 },
            { q: "동료가 발표를 망쳐서 우울해합니다. 어떤 말을 해주시겠어요?", a: ["다음에 잘하면 돼. 너무 신경 쓰지 마.", "많이 준비했는데 아쉽네. 커피 한잔할까?", "어떤 부분이 부족했던 것 같아?"], correct: 1 }
        ];
        const scenario = scenarios[Math.floor(currentRandFn() * scenarios.length)];
        currentCorrectAnswer = scenario.correct;
        gameArea.innerHTML = `
            <div class="game-display question">${scenario.q}</div>
            <div class="choices">
                ${scenario.a.map((choice, index) => `<button class="choice-btn" data-index="${index}">${choice}</button>`).join('')}
            </div>
        `;
        document.getElementById('game-input-area').innerHTML = '';
        gameInProgress = true;
    }

    // Game 1: Creative Connection
    function setupCreativeConnectionGame() {
        document.getElementById('gameTitle').innerText = "오늘의 게임: 창의적 연결";
        const gameArea = document.getElementById('gameArea');
        const wordPairs = [["달", "자전거"], ["비", "도서관"], ["별", "피아노"]];
        const pair = wordPairs[Math.floor(currentRandFn() * wordPairs.length)];
        gameArea.innerHTML = `<div class="game-display question">'${pair[0]}'와(과) '${pair[1]}'.<br>두 단어를 사용하여 감성적인 한 문장을 만들어 보세요.</div>`;
        document.getElementById('game-input-area').innerHTML = `
            <div class="game-input">
                <input type="text" id="userSentence" placeholder="여기에 문장을 작성하세요...">
                <button id="submitSentence">제출</button>
            </div>
        `;
        gameInProgress = true;
    }

    // Game 2: What's the Vibe?
    function setupVibeGame() {
        document.getElementById('gameTitle').innerText = "오늘의 게임: 분위기 맞추기";
        const gameArea = document.getElementById('gameArea');
        const vibes = [
            { item: "https://via.placeholder.com/300x200/333/fff?text=Rainy+Window", type: "image", a: ["기쁨", "우울함", "호기심"], correct: 1 },
            { item: "(새가 지저귀는 소리)", type: "sound", a: ["평화로움", "긴장감", "슬픔"], correct: 0 }
        ];
        const vibe = vibes[Math.floor(currentRandFn() * vibes.length)];
        currentCorrectAnswer = vibe.correct;
        let itemHtml = vibe.type === 'image' ? `<img src="${vibe.item}" style="max-width:100%; border-radius:8px;">` : `<p style="font-style:italic;">${vibe.item}</p>`;
        gameArea.innerHTML = `
            <div class="game-display question">다음 ${vibe.type === 'image' ? '이미지에서' : '소리에서'} 어떤 분위기가 느껴지나요?</div>
            ${itemHtml}
            <div class="choices" style="margin-top:1em;">
                ${vibe.a.map((choice, index) => `<button class="choice-btn" data-index="${index}">${choice}</button>`).join('')}
            </div>
        `;
        document.getElementById('game-input-area').innerHTML = '';
        gameInProgress = true;
    }

    // Game 3: Idealistic Slogan
    function setupSloganGame() {
        document.getElementById('gameTitle').innerText = "오늘의 게임: 이상적인 슬로건";
        const gameArea = document.getElementById('gameArea');
        const causes = ["환경 보호", "동물권 신장", "모두를 위한 교육"];
        const cause = causes[Math.floor(currentRandFn() * causes.length)];
        gameArea.innerHTML = `<div class="game-display question">'${cause}'을(를) 위한 짧고 이상적인 슬로건을 만들어 보세요.</div>`;
        document.getElementById('game-input-area').innerHTML = `
            <div class="game-input">
                <input type="text" id="userSlogan" placeholder="예: 모든 생명이 빛나는 세상을 위해">
                <button id="submitSlogan">제출</button>
            </div>
        `;
        gameInProgress = true;
    }

    // --- Game Dispatcher and Common Logic ---
    const gameTypes = [
        setupEmpathyChoiceGame,
        setupCreativeConnectionGame,
        setupVibeGame,
        setupSloganGame
    ];

    function getDayOfWeekText(day) {
        const messages = [
            "일요일의 마무리, 당신의 내면을 들여다보는 시간을 가져보세요.", // Sunday
            "새로운 한 주, 당신의 따뜻한 마음으로 세상을 밝혀주세요.", // Monday
            "오늘은 당신의 깊은 공감 능력이 필요한 날입니다.", // Tuesday
            "주 중반, 잠시 몽상에 빠져보는 건 어떨까요?", // Wednesday
            "당신의 이상이 세상을 더 나은 곳으로 만듭니다.", // Thursday
            "주말을 앞둔 금요일, 창의적인 영감을 떠올려 보세요.", // Friday
            "여유로운 토요일, 아름다운 것들을 감상하며 하루를 보내세요.", // Saturday
        ];
        return messages[day];
    }

    function showFeedback(isCorrect, message) {
        const feedbackMessage = document.getElementById('feedbackMessage');
        if (isCorrect) {
            feedbackMessage.innerText = message || "정답입니다! 역시 INFP, 따뜻한 마음과 창의력을 지니셨군요.";
            feedbackMessage.className = "feedback-message correct";
        } else {
            feedbackMessage.innerText = message || "아쉽네요. 당신의 마음이 이끄는 대로 다시 생각해 보세요.";
            feedbackMessage.className = "feedback-message incorrect";
        }
        gameInProgress = false;
    }

    function handleChoiceClick(event) {
        if (!gameInProgress) return;
        const selectedIndex = parseInt(event.target.getAttribute('data-index'));
        showFeedback(selectedIndex === currentCorrectAnswer);
        document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
    }

    function handleGenericSubmit(inputId, correctMsg) {
        if (!gameInProgress) return;
        const userInput = document.getElementById(inputId).value;
        if (userInput.trim()) {
            showFeedback(true, correctMsg);
        } else {
            showFeedback(false, "한 글자라도 입력해 주세요!");
        }
        document.querySelector(`#${inputId} + button`).disabled = true;
    }

    function initDailyGame() {
        const today = new Date();
        const seed = getDailySeed();
        currentRandFn = mulberry32(seed);
        
        const dayOfWeek = today.getDay();
        document.getElementById('gameDescription').innerText = getDayOfWeekText(dayOfWeek);

        const gameTypeIndex = Math.floor(currentRandFn() * gameTypes.length + dayOfWeek) % gameTypes.length;
        gameTypes[gameTypeIndex]();

        document.getElementById('feedbackMessage').innerText = '';
        document.getElementById('feedbackMessage').className = "feedback-message";
        
        const currentGameFn = gameTypes[gameTypeIndex];
        if (currentGameFn === setupCreativeConnectionGame) {
            document.getElementById('submitSentence').addEventListener('click', () => handleGenericSubmit('userSentence', '아름다운 문장이네요!'));
        } else if (currentGameFn === setupSloganGame) {
            document.getElementById('submitSlogan').addEventListener('click', () => handleGenericSubmit('userSlogan', '멋진 슬로건이에요!'));
        } else {
             document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', handleChoiceClick);
            });
        }
    }

    window.onload = function() {
        try {
            initDailyGame();
        } catch (e) {
            console.error("오늘의 게임 생성 중 오류 발생:", e);
            document.getElementById('gameDescription').innerText = "콘텐츠를 불러오는 데 실패했습니다. 페이지를 새로고침해 주세요.";
        }
    };
    </script>
</body>
</html>
